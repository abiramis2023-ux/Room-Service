apiVersion: apps/v1
kind: Deployment
metadata:
  name: room-booking-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: room-booking
  template:
    metadata:
      labels:
        app: room-booking
    spec:
      containers:
      - name: room-booking
        image: your-23mis0417/room-booking:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: room-booking-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: room-booking